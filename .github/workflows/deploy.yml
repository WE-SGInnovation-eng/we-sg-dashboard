name: Deploy to Vercel (production)

# Deploys the site to Vercel production on every push to main, and on demand.
# Requires ONE repo secret: VERCEL_TOKEN (Settings -> Secrets and variables -> Actions).
# The Org and Project IDs below are not secret.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_S2jlwu2VjZru9zcDame3L4YL
  VERCEL_PROJECT_ID: prj_igrvtYJDmr9M1jNZsVPXsnjNyAFX

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
